version: '3.8'

services:
  free-claude-code:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: free-claude-code
    ports:
      - "8082:8082"
    restart: unless-stopped
    volumes:
      # 可选：挂载工作空间目录（用于 Discord/Telegram bot）
      - ../agent_workspace:/app/agent_workspace
    environment:
      - NVIDIA_NIM_API_KEY=sk-2ef0c28a5d484db0a59ec7ffa7251d45
      - MODEL=qwen/qwen-max-latest
      - ANTHROPIC_AUTH_TOKEN=freecc
